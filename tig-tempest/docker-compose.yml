name: tempest

# GO-LIVE Phase 2 — the game + a thin FastAPI app + Postgres (players/scores/presence).
# No auth yet. Open http://localhost:8080 after `docker compose up -d --build`.
services:
  tempest-app:
    build:
      context: .
      dockerfile: app/Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-dev}
      GAME_DIR: /srv/game
      # One URL feeds runtime (asyncpg) + Alembic (psycopg, swapped in env.py).
      DATABASE_URL: postgresql://tempest:${POSTGRES_PASSWORD:-tempest_dev}@tempest-db:5432/tempest
      # Auth (OIDC). Local defaults target the dev Keycloak (docker-compose.dev.yml);
      # the sbx overlay overrides these to the shared auth.wolfhold.app on the box.
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
      KC_PUBLIC_URL: ${KC_PUBLIC_URL:-http://localhost:8082}
      KC_INTERNAL_URL: ${KC_INTERNAL_URL:-http://tempest-kc:8080}
      KC_REALM: ${KC_REALM:-tempest-sbx}
      KC_CLIENT_ID: ${KC_CLIENT_ID:-tempest-web}
      KC_CLIENT_SECRET: ${KC_CLIENT_SECRET:-tempest-dev-secret-change-me}
      SESSION_SECRET: ${SESSION_SECRET:-dev-session-secret-change-me}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      # Object storage (avatars, banners).
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-tempest-minio:9000}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-tempest}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-tempest_dev}
      MINIO_BUCKET: ${MINIO_BUCKET:-tempest}
    volumes:
      # Live-edit the game + test scripts in dev without a rebuild (read-only over the baked-in copies).
      - ./game:/srv/game:ro
      - ./app/testkit:/app/testkit:ro
    ports:
      # Loopback-only in dev, like freehold. Host 8080 -> container 8000.
      - "127.0.0.1:8080:8000"
    depends_on:
      tempest-db:
        condition: service_healthy
      tempest-minio:
        condition: service_started
    restart: unless-stopped

  tempest-minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-tempest}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-tempest_dev}
    volumes:
      - tempest-minio-data:/data
    ports:
      - "127.0.0.1:9101:9001"     # MinIO console (optional) — avoids clash with freehold's
    restart: unless-stopped

  tempest-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tempest
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tempest_dev}
      POSTGRES_DB: tempest
    volumes:
      - tempest-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tempest -d tempest"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  tempest-pgdata:
  tempest-minio-data:
