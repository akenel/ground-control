# TIG · Tempest — SBX (sandbox) box overlay.
#
# Runs the Phase-1 app ON THE WOLFHOLD BOX, behind freehold's shared Caddy,
# served at https://dev-tempest.wolfhold.app (real, auto-renewing Let's Encrypt).
# Own stack, shared front door: this container just joins freehold's network so
# freehold's Caddy can reverse_proxy to it — nothing about freehold's compose
# changes (only one block added to its Caddyfile — see DEPLOY-SBX.md).
#
# On the box (from tig-tempest/):
#   docker compose -f docker-compose.yml -f docker-compose.sbx.yml up -d --build
services:
  tempest-app:
    container_name: tempest-app
    environment:
      APP_ENV: sandbox          # /version + build bar show "· SANDBOX"; dev cheats ON (dev-/stg- hosts)
      # Auth → the shared Keycloak on the box (realm tempest-sbx provisioned via
      # ops/provision-realm.py). Internal hop uses freehold's keycloak container
      # (tempest-app is on freehold's network) — same split-horizon freehold uses.
      APP_BASE_URL: https://dev-tempest.wolfhold.app
      KC_PUBLIC_URL: https://auth.wolfhold.app
      KC_INTERNAL_URL: http://keycloak:8080
      KC_REALM: tempest-sbx
      KC_CLIENT_ID: tempest-web
      KC_CLIENT_SECRET: ${KC_CLIENT_SECRET:?set the tempest-web client secret on the box}
      SESSION_SECRET: ${SESSION_SECRET:?set a long random session secret on the box}
      SESSION_COOKIE_SECURE: "true"
    networks:
      edge:
        aliases: [tempest-app]  # so freehold's Caddy can: reverse_proxy tempest-app:8000
      default: {}               # so the app can still reach tempest-db (Phase 2+)

networks:
  edge:
    external: true
    name: freehold_freehold     # freehold's compose network — verify: docker network ls | grep freehold
